name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- 1. SETUP & RUN UNIT TESTS ---
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # Using the current LTS version

      - name: Restore Dependencies
        run: dotnet restore FlashcardAPI.slnx

      - name: Run Tests
        run: dotnet test FlashcardAPI.slnx --no-restore --verbosity normal
        continue-on-error: true

      # --- 2. LOG IN TO GITHUB CONTAINER REGISTRY ---
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- 3. SET LOWERCASE IMAGE NAMES ---
      # This step creates a clean variable so we don't have to repeat the 'tr' command
      - name: Set Image Names
        run: |
          LOWER_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/$LOWER_REPO-backend" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/$LOWER_REPO-frontend" >> $GITHUB_ENV

      # --- 4. BUILD AND PUSH BACKEND IMAGE ---
      - name: Build and Push Backend
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:latest -f FlashcardAPI/dockerfile .
          docker push ${{ env.BACKEND_IMAGE }}:latest

      # --- 5. BUILD AND PUSH FRONTEND IMAGE ---
      - name: Build and Push Frontend
        run: |
          docker build -t ${{ env.FRONTEND_IMAGE }}:latest -f FlashcardSite/dockerfile .
          docker push ${{ env.FRONTEND_IMAGE }}:latest